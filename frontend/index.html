<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="衰鬼回收站 TrashMatch — 大家都沒救了，不如就在一起吧。" />
  <title>🗑️ 衰鬼回收站 TrashMatch</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/pages.css" />
  <link rel="stylesheet" href="css/chat.css" />
</head>
<body>

  <!-- ===== 導覽列 ===== -->
  <nav id="nav-bar" role="navigation" aria-label="主要導覽">
    <span class="nav-brand">🗑️ TrashMatch</span>
    <ul class="nav-links" role="list">
      <li><a href="#feed" class="nav-link active" data-page="feed" aria-current="page">🏠 首頁</a></li>
      <li><a href="#post" class="nav-link" data-page="post">📝 投稿</a></li>
    </ul>
  </nav>

  <main>

    <!-- ===== Feed 頁 ===== -->
    <section id="feed-page" class="page" aria-label="首頁">

      <header class="feed-header">
        <!-- 大垃圾桶主視覺 -->
        <div class="hero-trash-wrapper">
          <img src="images/trash.png" alt="" class="hero-trash-img" aria-hidden="true" />
          <div class="hero-speech-bubble" aria-hidden="true">
            我也沒救了…
          </div>
        </div>

        <h1 class="feed-title">🗑️ 衰鬼回收站</h1>
        <p class="slogan">大家都沒救了，不如就在一起吧。</p>
        <p class="slogan-sub">( 比慘交友平台 · 匿名 · 免費 · 沒有希望 )</p>
      </header>

      <!-- 慘事卡片 -->
      <div class="feed-card-wrapper">
        <article id="story-card" class="story-card" aria-live="polite" aria-label="慘事卡片">

          <!-- 卡片頭部 -->
          <div class="story-card__header">
            <div class="avatar-wrapper" aria-hidden="true">
              <img src="images/trash.png" alt="垃圾桶頭像" class="avatar-img" />
              <span class="avatar-badge">衰鬼</span>
            </div>
            <div class="story-card__meta">
              <span class="story-card__anon">匿名衰鬼 #????</span>
              <span class="story-card__tag">💀 慘事認證</span>
            </div>
          </div>

          <!-- 慘事內容 -->
          <div id="story-content" class="story-card__content" aria-label="慘事內容">
            <span class="loading-text">載入中… 🗑️</span>
          </div>

          <!-- 卡片底部 -->
          <div class="story-card__footer">
            <div class="pat-count" aria-label="拍拍數">
              <img src="images/heart.png" alt="" class="pat-count-icon" aria-hidden="true" />
              <span id="pat-count">0</span>
              <span class="pat-count-label">人拍拍</span>
            </div>

            <div class="story-card__actions">
              <button id="pat-btn" class="pixel-btn pat-btn" type="button" aria-label="給這則慘事拍拍">
                <img src="images/heart.png" alt="" class="pat-icon-img" aria-hidden="true" />
                拍拍 TA
              </button>
              <button id="next-btn" class="pixel-btn next-btn" type="button" aria-label="換一則慘事">
                再看一個慘的 👀
              </button>
            </div>
          </div>
        </article>

        <div id="feed-feedback" role="alert" aria-live="assertive"></div>
      </div>

    </section>

    <!-- ===== Post 頁 ===== -->
    <section id="post-page" class="page hidden" aria-label="投稿頁">

      <header class="post-header">
        <div class="post-header-mascot" aria-hidden="true">
          <img src="images/trash.png" alt="" class="post-mascot-img" />
          <div class="post-mascot-bubble">說出來！</div>
        </div>
        <h2 class="post-title">📢 投稿你的慘事</h2>
        <p class="post-subtitle">越慘越好，大家都懂你 🥲</p>
      </header>

      <div class="post-form-wrapper">
        <div class="post-success-avatar hidden" id="post-success-avatar" aria-hidden="true">
          <div class="avatar-wrapper avatar-wrapper--large">
            <img src="images/trash.png" alt="垃圾桶頭像" class="avatar-img" />
            <span class="avatar-badge">已送出</span>
          </div>
        </div>

        <form id="post-form" novalidate>
          <label for="post-input" class="visually-hidden">輸入你的慘事</label>
          <textarea
            id="post-input"
            name="content"
            placeholder="說說你有多慘… 越慘越好 🗑️&#10;&#10;例：今天被老闆罵、被貓嫌棄、連外送都送錯…"
            rows="6"
            maxlength="500"
            aria-required="true"
            aria-describedby="post-feedback"
          ></textarea>

          <div id="post-feedback" role="alert" aria-live="assertive"></div>

          <button id="post-submit" class="pixel-btn pixel-btn--primary" type="submit" aria-label="送出我的慘事">
            🗑️ 我也沒救了，送出！
          </button>
        </form>
      </div>

    </section>

  </main>

  <!-- ===== 聊天室面板 ===== -->
  <aside id="chat-panel" class="chat-panel hidden" role="complementary" aria-label="聊天室" aria-hidden="true">
    <div class="chat-panel__header">
      <h2 class="chat-panel__title">💘 配對成功！你們都沒救了</h2>
      <button id="chat-close-btn" type="button" aria-label="關閉聊天室">✕</button>
    </div>

    <div class="chat-panel__body">
      <p class="chat-panel__greeting">
        你們都沒救了，<br />不如聊聊吧 💬✨
      </p>

      <div class="chat-panel__placeholder">
        <img src="images/chat.png" alt="聊天室圖示" class="chat-panel__placeholder-img" />
        <p class="chat-panel__placeholder-text">
          🚧 聊天功能即將上線<br />
          <span class="chat-coming-soon">先互相拍拍對方的慘事吧</span>
        </p>
      </div>
    </div>

    <div class="chat-panel__footer">
      <input type="text" class="chat-panel__input-placeholder" placeholder="💬 聊天功能即將開放…" disabled aria-label="聊天輸入框（尚未開放）" />
    </div>
  </aside>

  <script type="module" src="js/main.js"></script>

</body>
</html>
